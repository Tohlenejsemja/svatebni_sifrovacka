<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Šifrovačka</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <h1 class="logo">Šifrovačka</h1>
      <p class="login-subtitle">Vítejte v šifrovací hře! Zadejte své jméno pro začátek.</p>
      <form id="login-form">
        <input type="text" id="username-input" placeholder="Vaše jméno nebo přezdívka" maxlength="30" autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Vstoupit</button>
      </form>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="screen hidden">
    <header class="top-bar">
      <h1 class="logo logo-small">Šifrovačka</h1>
      <div class="user-info">
        <span id="display-username"></span>
        <button id="logout-btn" class="btn btn-small" title="Odhlásit se">Odhlásit</button>
      </div>
    </header>
    <main id="puzzle-list"></main>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/puzzles.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
